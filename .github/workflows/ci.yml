name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  CI: true
  SKIP_ENV_VALIDATION: "true"
  NEXTAUTH_SECRET: "ci-fallback-secret-key-for-build-only"
  NEXTAUTH_URL: "http://localhost:3000"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx next lint --quiet

      - name: TypeScript check
        run: npm run type-check

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || env.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || env.NEXTAUTH_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/personal-blog-ci' }}
          SKIP_ENV_VALIDATION: "true"
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .next/
          retention-days: 1

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel@latest

      - name: Build & Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel build --prod --yes --token=${{ env.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --yes --token=${{ env.VERCEL_TOKEN }}
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || env.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || env.NEXTAUTH_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/personal-blog-ci' }}
          SKIP_ENV_VALIDATION: "true"
